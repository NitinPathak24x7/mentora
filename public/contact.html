<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Contact - Mentora</title><link rel='stylesheet' href='styles.css'></head><body><header class='header'><div style='display:flex;align-items:center;gap:12px'><a href='index.html'><img src='logo.png' class='logo'></a></div></header><main class='container' style='padding-top:20px'><h1>Contact</h1><form id='contactForm' style='display:flex;flex-direction:column;gap:8px;max-width:720px'><input id='name' placeholder='Your name' required style='padding:8px;border-radius:8px;border:1px solid #ccc'><input id='email' placeholder='Your email' required style='padding:8px;border-radius:8px;border:1px solid #ccc'><textarea id='message' rows='6' placeholder='Message' style='padding:8px;border-radius:8px;border:1px solid #ccc'></textarea><div style='display:flex;gap:8px'><button type='button' id='sendBtn' class='btn btn-accent'>Send</button></div><div id='status' style='color:green'></div></form><script>document.getElementById('sendBtn').addEventListener('click', async ()=>{ const payload={name:document.getElementById('name').value,email:document.getElementById('email').value,message:document.getElementById('message').value}; try{ const res=await fetch('/contact',{method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify(payload)}); const j=await res.json(); document.getElementById('status').textContent=j.sent?'Message sent via email.':'Message recorded (email not configured).'; document.getElementById('contactForm').reset(); }catch(err){ document.getElementById('status').textContent='Network error'; }});</script></main></body></html>
